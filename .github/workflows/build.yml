name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag'
        required: false
        default: 'auto'

env:
  NDK_VERSION: r26b
  MIN_SDK: 29

jobs:
  build:
    name: Build ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Cache CMake
        uses: actions/cache@v4
        with:
          path: |
            build/CMakeCache.txt
            build/CMakeFiles
          key: ${{ runner.os }}-${{ matrix.abi }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Check hardware.h
        run: |
          if [ ! -f include/device/hardware.h ]; then
            echo "Error: include/device/hardware.h not found"            exit 1
          fi
          echo "Found hardware.h"

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ env.MIN_SDK }} \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Strip
        run: |
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
            --strip-unneeded build/hyperpredictd

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: hyperpredictd-${{ matrix.abi }}
          path: build/hyperpredictd
          retention-days: 1

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare
        run: |
          mkdir -p release_assets
          TIMESTAMP=$(date +%Y%m%d_%H%M)          COMMIT_SHORT=${GITHUB_SHA::7}
          
          for abi in arm64-v8a armeabi-v7a x86_64; do
            SRC="artifacts/hyperpredictd-$abi/hyperpredictd"
            if [ -f "$SRC" ]; then
              DST="release_assets/hyperpredictd-$abi-$TIMESTAMP-$COMMIT_SHORT"
              cp "$SRC" "$DST"
              chmod +x "$DST"
              echo "Created: $DST"
            fi
          done

      - name: Get Tag
        id: get_tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            COUNT=$(git rev-list --count HEAD)
            SHORT=${GITHUB_SHA::7}
            TAG=v0.$COUNT-$SHORT
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: HyperPredict ${{ steps.get_tag.outputs.tag }}
          files: release_assets/*
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
