name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag'
        required: false
        default: 'auto'
      enable_debug:
        description: 'Enable debug build'
        required: false
        default: 'false'
        type: boolean

env:
  NDK_VERSION: r26b
  MIN_SDK: 29

jobs:
  # ==================== 构建摘要 ====================
  build-info:
    name: Build Information
    runs-on: ubuntu-latest
    steps:
      - name: Print Build Info
        run: |
          echo "============================================"
          echo "       HyperPredict Build Information"
          echo "============================================"
          echo ""
          echo "📅 Timestamp:        $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🌿 Branch:           ${{ github.ref_name }}"
          echo "📝 Commit SHA:       ${{ github.sha }}"
          echo "👤 Triggered by:     ${{ github.actor }}"
          echo "🎯 Event:            ${{ github.event_name }}"
          echo "🔧 NDK Version:      ${{ env.NDK_VERSION }}"
          echo "📱 Min SDK:          ${{ env.MIN_SDK }}"
          echo "🖥️  Runner:           ${{ runner.os }}"
          echo ""
          echo "============================================"
          echo "       Build Matrix"
          echo "============================================"
          echo "  • arm64-v8a      (64-bit ARM, modern devices)"
          echo "  • armeabi-v7a    (32-bit ARM, legacy devices)"
          echo "  • x86_64         (64-bit x86, emulator/testing)"
          echo ""

  # ==================== 构建任务 ====================
  build:
    name: Build ${{ matrix.abi }}
    needs: build-info
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print Environment
        run: |
          echo "============================================"
          echo "  Environment for ${{ matrix.abi }}"
          echo "============================================"
          echo "NDK_HOME: $ANDROID_NDK_HOME"
          echo "CMake:    $(cmake --version | head -1)"
          echo "Make:     $(make --version | head -1)"
          echo "nproc:    $(nproc)"
          echo "============================================"

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Cache CMake
        id: cache-cmake
        uses: actions/cache@v4
        with:
          path: |
            build/CMakeCache.txt
            build/CMakeFiles
          key: ${{ runner.os }}-${{ matrix.abi }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Cache Hit Info
        run: |
          if [ "${{ steps.cache-cmake.outputs.cache-hit }}" == "true" ]; then
            echo "✅ CMake cache restored from cache"
          else
            echo "📦 CMake cache miss - will rebuild"
          fi

      - name: Check hardware.h
        run: |
          echo "🔍 Checking hardware.h..."
          if [ ! -f include/device/hardware.h ]; then
            echo "❌ Error: include/device/hardware.h not found"
            exit 1
          fi
          echo "✅ Found hardware.h"
          echo ""
          echo "--- hardware.h contents ---"
          cat include/device/hardware.h
          echo ""
          echo "---------------------------"

      - name: Configure
        id: configure
        run: |
          echo "============================================"
          echo "  CMake Configure for ${{ matrix.abi }}"
          echo "============================================"
          START_TIME=$(date +%s)
          
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ env.MIN_SDK }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_VERBOSE_MAKEFILE=ON
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "⏱️  Configure time: ${DURATION}s"
          echo "configure_time=${DURATION}" >> $GITHUB_OUTPUT

      - name: Build
        id: build
        run: |
          echo "============================================"
          echo "  Building ${{ matrix.abi }}"
          echo "============================================"
          START_TIME=$(date +%s)
          
          cmake --build build -j$(nproc) 2>&1 | tee build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          echo ""
          echo "============================================"
          echo "  Build Summary"
          echo "============================================"
          echo "⏱️  Build time:      ${DURATION}s"
          echo "📊 Build result:    $([ $BUILD_RESULT -eq 0 ] && echo '✅ SUCCESS' || echo '❌ FAILED')"
          echo "📁 Output size:     $(ls -lh build/hyperpredictd 2>/dev/null | awk '{print $5}' || echo 'N/A')"
          
          echo "build_time=${DURATION}" >> $GITHUB_OUTPUT
          
          if [ $BUILD_RESULT -ne 0 ]; then
            echo ""
            echo "❌ Build failed! Last 50 lines of output:"
            tail -50 build.log
            exit $BUILD_RESULT
          fi

      - name: Strip
        run: |
          echo "🔧 Stripping binary..."
          BEFORE_SIZE=$(stat -c%s build/hyperpredictd)
          
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
            --strip-unneeded build/hyperpredictd
          
          AFTER_SIZE=$(stat -c%s build/hyperpredictd)
          SAVED=$((BEFORE_SIZE - AFTER_SIZE))
          RATIO=$(echo "scale=1; $SAVED * 100 / $BEFORE_SIZE" | bc)
          
          echo "✅ Strip complete"
          echo "   Before: $(numfmt --to=iec $BEFORE_SIZE)"
          echo "   After:  $(numfmt --to=iec $AFTER_SIZE)"
          echo "   Saved:  $(numfmt --to=iec $SAVED) (${RATIO}%)"

      - name: Binary Info
        run: |
          echo "============================================"
          echo "  Binary Information"
          echo "============================================"
          file build/hyperpredictd
          ls -lh build/hyperpredictd
          
          echo ""
          echo "ELF sections:"
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf -S build/hyperpredictd | head -20

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: hyperpredictd-${{ matrix.abi }}
          path: build/hyperpredictd
          retention-days: 1

      - name: Build Success Summary
        if: success()
        run: |
          echo ""
          echo "✅ ═════════════════════════════════════════════════"
          echo "   Build SUCCESS for ${{ matrix.abi }}"
          echo "═══════════════════════════════════════════════════"
          echo "   Configure: ${{ steps.configure.outputs.configure_time }}s"
          echo "   Build:     ${{ steps.build.outputs.build_time }}s"
          echo "   Size:      $(ls -lh build/hyperpredictd | awk '{print $5}')"
          echo "═══════════════════════════════════════════════════"

      - name: Build Failure Summary
        if: failure()
        run: |
          echo ""
          echo "❌ ═════════════════════════════════════════════════"
          echo "   Build FAILED for ${{ matrix.abi }}"
          echo "═══════════════════════════════════════════════════"
          echo "   Check the logs above for details"
          echo "═══════════════════════════════════════════════════"

  # ==================== 发布任务 ====================
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: |
          echo "============================================"
          echo "  Downloaded Artifacts"
          echo "============================================"
          find artifacts -type f -exec ls -lh {} \;

      - name: Prepare Release Assets
        id: prepare
        run: |
          echo "============================================"
          echo "  Preparing Release Assets"
          echo "============================================"
          
          mkdir -p release_assets
          TIMESTAMP=$(date +%Y%m%d_%H%M)
          COMMIT_SHORT=${GITHUB_SHA::7}
          
          echo "📅 Timestamp: $TIMESTAMP"
          echo "📝 Commit:    $COMMIT_SHORT"
          echo ""
          
          for abi in arm64-v8a armeabi-v7a x86_64; do
            SRC="artifacts/hyperpredictd-$abi/hyperpredictd"
            if [ -f "$SRC" ]; then
              DST="release_assets/hyperpredictd-$abi-$TIMESTAMP-$COMMIT_SHORT"
              cp "$SRC" "$DST"
              chmod +x "$DST"
              SIZE=$(ls -lh "$DST" | awk '{print $5}')
              echo "✅ Created: $DST ($SIZE)"
            else
              echo "⚠️  Missing: $abi"
            fi
          done
          
          echo ""
          echo "📦 Release assets:"
          ls -lh release_assets/
          
          # Count assets
          ASSET_COUNT=$(ls release_assets/ | wc -l)
          echo "asset_count=$ASSET_COUNT" >> $GITHUB_OUTPUT

      - name: Get Tag
        id: get_tag
        run: |
          echo "============================================"
          echo "  Determining Release Tag"
          echo "============================================"
          
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "🏷️  Using git tag: $TAG"
          else
            COUNT=$(git rev-list --count HEAD)
            SHORT=${GITHUB_SHA::7}
            TAG=v0.$COUNT-$SHORT
            echo "🏷️  Generated tag: $TAG (commit #$COUNT)"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: HyperPredict ${{ steps.get_tag.outputs.tag }}
          body: |
            ## HyperPredict ${{ steps.get_tag.outputs.tag }}
            
            ### 📋 Build Information
            | Property | Value |
            |----------|-------|
            | Commit | `${{ github.sha }}` |
            | Branch | `${{ github.ref_name }}` |
            | Triggered by | @${{ github.actor }} |
            | Build time | ${{ github.event.head_commit.timestamp }} |
            
            ### 📦 Binaries
            | ABI | Description |
            |-----|-------------|
            | arm64-v8a | 64-bit ARM (modern devices) |
            | armeabi-v7a | 32-bit ARM (legacy devices) |
            | x86_64 | 64-bit x86 (emulator/testing) |
            
            ### 🚀 Usage
            ```bash
            # Push to device
            adb push hyperpredictd-arm64-v8a-* /data/local/tmp/hyperpredictd
            adb shell chmod +x /data/local/tmp/hyperpredictd
            adb shell /data/local/tmp/hyperpredictd
            ```
            
            ---
            *Built with NDK ${{ env.NDK_VERSION }} for Android ${{ env.MIN_SDK }}+*
          files: release_assets/*
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "           ✅ RELEASE CREATED SUCCESSFULLY"
          echo "══════════════════════════════════════════════════════════"
          echo ""
          echo "  🏷️  Tag:        ${{ steps.get_tag.outputs.tag }}"
          echo "  📦 Assets:     ${{ steps.prepare.outputs.asset_count }} binaries"
          echo "  🔗 URL:        ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.get_tag.outputs.tag }}"
          echo ""
          echo "══════════════════════════════════════════════════════════"
