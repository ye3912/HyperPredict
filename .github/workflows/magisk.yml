name: Build Magisk Module

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-29 -GNinja
          ninja
          cd ..

      - name: Create Module
        run: |
          mkdir -p magisk_module/system/bin
          mkdir -p magisk_module/logs
          cp build/hyperpredictd magisk_module/system/bin/
          
          echo "id=hyperpredict" > magisk_module/module.prop
          echo "name=HyperPredict" >> magisk_module/module.prop
          echo "version=v1.0" >> magisk_module/module.prop
          echo "author=ye3912" >> magisk_module/module.prop
          
          echo "#!/system/bin/sh" > magisk_module/service.sh
          echo "MODDIR=\${0%/*}" >> magisk_module/service.sh
          echo "sleep 20" >> magisk_module/service.sh
          echo "nohup \$MODDIR/system/bin/hyperpredictd > \$MODDIR/logs/hp.log 2>&1 &" >> magisk_module/service.sh
          chmod +x magisk_module/service.sh
          
          mkdir -p magisk_module/META-INF/com/google/android
          echo "#!/sbin/sh" > magisk_module/META-INF/com/google/android/update-binary
          echo "unzip -o \"\$ZIPFILE\" -d \$MODPATH" >> magisk_module/META-INF/com/google/android/update-binary
          chmod +x magisk_module/META-INF/com/google/android/update-binary
          echo "" > magisk_module/META-INF/com/google/android/updater-script
          
          cd magisk_module
          zip -r ../HyperPredict-magisk.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HyperPredict-Magisk
          path: HyperPredict-magisk.zip