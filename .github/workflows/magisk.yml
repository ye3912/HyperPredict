name: Build Magisk Module

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Install Dependencies
        run: sudo apt-get install -y cmake ninja-build zip

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -GNinja
          ninja

      - name: Create Module
        run: |
          mkdir -p magisk_module/system/bin
          mkdir -p magisk_module/logs
          mkdir -p magisk_module/META-INF/com/google/android
          
          cp build/hyperpredictd magisk_module/system/bin/
          
          cat > magisk_module/module.prop << 'EOF'
id=hyperpredict
name=HyperPredict
version=v2.1-integrated
versionCode=210
author=ye3912
description=AI CPU Scheduler - Game+JSON+Perf Optimized
EOF
          
          echo '#!/system/bin/sh' > magisk_module/service.sh
          echo 'MODDIR=${0%/*}' >> magisk_module/service.sh
          echo 'sleep 20' >> magisk_module/service.sh
          echo 'mkdir -p $MODDIR/logs' >> magisk_module/service.sh
          echo 'nohup $MODDIR/system/bin/hyperpredictd >> $MODDIR/logs/hp.log 2>&1 &' >> magisk_module/service.sh
          chmod +x magisk_module/service.sh
          
          echo '#!/sbin/sh' > magisk_module/META-INF/com/google/android/update-binary
          echo 'unzip -o "$ZIPFILE" -d $MODPATH' >> magisk_module/META-INF/com/google/android/update-binary
          chmod +x magisk_module/META-INF/com/google/android/update-binary
          
          touch magisk_module/META-INF/com/google/android/updater-script
          
          cd magisk_module
          zip -r ../HyperPredict-magisk.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: HyperPredict-Magisk
          path: HyperPredict-magisk.zip