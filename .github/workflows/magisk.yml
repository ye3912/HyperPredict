name: Build Magisk Module

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-29
          make -j$(nproc)
          cd ..

      - name: Create Module
        run: |
          mkdir -p magisk_module/system/bin
          cp build/hyperpredictd magisk_module/system/bin/
          
          echo "id=hyperpredict" > magisk_module/module.prop
          echo "name=HyperPredict" >> magisk_module/module.prop
          echo "version=v2.0.0" >> magisk_module/module.prop
          echo "versionCode=200" >> magisk_module/module.prop
          echo "author=ye3912" >> magisk_module/module.prop
          
          echo "#!/system/bin/sh" > magisk_module/service.sh
          echo "nohup \${0%/*}/system/bin/hyperpredictd > /data/local/tmp/hp.log 2>&1 &" >> magisk_module/service.sh
          chmod +x magisk_module/service.sh
          
          mkdir -p magisk_module/META-INF/com/google/android
          echo "#!/sbin/sh" > magisk_module/META-INF/com/google/android/update-binary
          echo "chmod 755 \$MODPATH/system/bin/hyperpredictd" >> magisk_module/META-INF/com/google/android/update-binary
          chmod +x magisk_module/META-INF/com/google/android/update-binary
          
          touch magisk_module/META-INF/com/google/android/updater-script
          
          cd magisk_module
          zip -r ../HyperPredict-magisk.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: HyperPredict-Magisk
          path: HyperPredict-magisk.zip