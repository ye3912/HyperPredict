name: Build Magisk Module

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  MODULE_AUTHOR: ye3912
  MODULE_DESC: AI CPU Scheduler with Neural Network Prediction

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      buildnum: ${{ steps.ver.outputs.buildnum }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: ver
        run: |
          DATE=$(date +%y.%m)
          NUM=$(git rev-list --count HEAD)
          echo "version=${DATE}.${NUM}" >> $GITHUB_OUTPUT
          echo "buildnum=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: true

      - run: sudo apt-get update && sudo apt-get install -y cmake ninja-build zip

      - run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-29 -DCMAKE_BUILD_TYPE=Release -GNinja
          ninja

      - run: |
          mkdir -p magisk_module/system/bin magisk_module/logs magisk_module/custom magisk_module/META-INF/com/google/android
          cp build/hyperpredictd magisk_module/system/bin/
          chmod 755 magisk_module/system/bin/hyperpredictd
          if [ -d "ksuwebui" ]; then cp -r ksuwebui magisk_module/custom/; fi
          printf 'id=hyperpredict\nname=HyperPredict\nversion=v%s\nversionCode=%s\nauthor=%s\ndescription=%s\n' '${{ steps.ver.outputs.version }}' '${{ steps.ver.outputs.buildnum }}' '${{ env.MODULE_AUTHOR }}' '${{ env.MODULE_DESC }}' > magisk_module/module.prop
          printf '#!/system/bin/sh\nMODDIR=${0%%/*}\nmkdir -p $MODDIR/logs\nsleep 15\npkill -f hyperpredictd 2>/dev/null || true\nnohup $MODDIR/system/bin/hyperpredictd >> $MODDIR/logs/hp.log 2>&1\n' > magisk_module/service.sh
          chmod 755 magisk_module/service.sh
          printf '#!/sbin/sh\nunzip -o "$ZIPFILE" -d $MODPATH\n' > magisk_module/META-INF/com/google/android/update-binary
          chmod 755 magisk_module/META-INF/com/google/android/update-binary
          printf '#MAGISK\n' > magisk_module/META-INF/com/google/android/updater-script

      - run: |
          cd magisk_module
          zip -r ../HyperPredict.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: HyperPredict-v${{ steps.ver.outputs.version }}
          path: HyperPredict.zip
          retention-days: 30

      - if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          release_name: HyperPredict v${{ steps.ver.outputs.version }}
          body: |
            ## HyperPredict v${{ steps.ver.outputs.version }}
            自动构建版本
            - Commit: `${{ github.sha }}`
            - Build: ${{ steps.ver.outputs.buildnum }}
          files: HyperPredict.zip
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
