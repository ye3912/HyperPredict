name: Build Magisk Module

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build zip

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_USE_LEGACY_TOOLCHAIN_FILE=OFF \
            -GNinja
          ninja
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK }}

      - name: Create module
        run: |
          mkdir -p magisk_module/system/bin
          mkdir -p magisk_module/logs
          mkdir -p magisk_module/META-INF/com/google/android
          cp build/hyperpredictd magisk_module/system/bin/
          chmod 755 magisk_module/system/bin/hyperpredictd

      - name: Create module.prop
        run: |
          echo "id=hyperpredict" > magisk_module/module.prop
          echo "name=HyperPredict" >> magisk_module/module.prop
          echo "version=v1.0" >> magisk_module/module.prop
          echo "versionCode=1" >> magisk_module/module.prop
          echo "author=ye3912" >> magisk_module/module.prop
          echo "description=AI CPU Scheduler" >> magisk_module/module.prop

      - name: Create scripts
        run: |
          echo '#!/system/bin/sh' > magisk_module/service.sh
          echo 'sleep 15' >> magisk_module/service.sh
          echo 'nohup $MODDIR/system/bin/hyperpredictd > $MODDIR/logs/hp.log 2>&1 &' >> magisk_module/service.sh
          chmod 755 magisk_module/service.sh
          
          echo '#!/sbin/sh' > magisk_module/META-INF/com/google/android/update-binary
          echo 'unzip -o "$ZIPFILE" -d $MODPATH' >> magisk_module/META-INF/com/google/android/update-binary
          chmod 755 magisk_module/META-INF/com/google/android/update-binary
          
          echo '#MAGISK' > magisk_module/META-INF/com/google/android/updater-script

      - name: Package
        run: |
          cd magisk_module
          zip -r ../HyperPredict.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HyperPredict-Magisk
          path: HyperPredict.zip
          retention-days: 30
