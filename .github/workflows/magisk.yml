name: Build Magisk Module

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Install ZIP
        run: sudo apt-get install -y zip

      - name: Create Magisk Module Structure
        run: |
          mkdir -p magisk_module/{META-INF/com/google/android,system/bin}
          
          # Create module.prop
          cat > magisk_module/module.prop << 'PROPEOF'
id=hyperpredict
name=HyperPredict
version=auto
versionCode=200
author=ye3912
description=AI-powered CPU scheduler with FTRL prediction
PROPEOF
          
          # Create service.sh
          cat > magisk_module/service.sh << 'SERVICEEOF'
#!/system/bin/sh
MODDIR=${0%/*}
sleep 20
setenforce 0 2>/dev/null
nohup $MODDIR/system/bin/hyperpredictd > /data/local/tmp/hp.log 2>&1 &
log -t HyperPredict "Service started"
SERVICEEOF          chmod +x magisk_module/service.sh
          
          # Create update-binary
          cat > magisk_module/META-INF/com/google/android/update-binary << 'UPDATEEOF'
#!/sbin/sh
OUTFD=$2
ZIPFILE=$3

ui_print() { echo "ui_print $1" > $OUTFD; echo "ui_print" > $OUTFD; }

ui_print "================================"
ui_print "  HyperPredict Installer"
ui_print "================================"
ui_print "Extracting files..."

unzip -o "$ZIPFILE" 'system/bin/hyperpredictd' -d $MODPATH

ui_print "Setting permissions..."
chmod 755 $MODPATH/system/bin/hyperpredictd

ui_print "Installation complete!"
ui_print "Reboot to activate"
UPDATEEOF
          chmod +x magisk_module/META-INF/com/google/android/update-binary
          
          # Create empty updater-script
          echo "" > magisk_module/META-INF/com/google/android/updater-script

      - name: Build HyperPredict Binary
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          make -j$(nproc)
          cd ..

      - name: Package Magisk Module
        run: |
          # Get version from git tag or use default
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "v2.0.0")
          
          # Copy binary to module
          cp build/hyperpredictd magisk_module/system/bin/
          
          # Update version in module.prop
          sed -i "s/version=.*/version=$VERSION/" magisk_module/module.prop          
          # Create release directory
          mkdir -p release
          
          # Create ZIP file
          cd magisk_module
          zip -r ../release/HyperPredict-$VERSION-magisk.zip .
          cd ..
          
          # Set environment variable for next steps
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "MODULE_ZIP=release/HyperPredict-$VERSION-magisk.zip" >> $GITHUB_ENV

      - name: Show Build Info
        run: |
          echo "================================"
          echo "Build Information"
          echo "================================"
          echo "Version: ${{ env.VERSION }}"
          echo "Module ZIP: ${{ env.MODULE_ZIP }}"
          echo "File size: $(du -h ${{ env.MODULE_ZIP }} | cut -f1)"
          echo "================================"

      - name: Upload Magisk Module Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperPredict-Magisk-${{ env.VERSION }}
          path: ${{ env.MODULE_ZIP }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.MODULE_ZIP }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}