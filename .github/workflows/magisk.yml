name: Build Magisk Module

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip

      - name: Fix CMakeLists.txt
        run: |
          # 确保链接 log 库
          if ! grep -q "target_link_libraries.*log" CMakeLists.txt; then
            echo "target_link_libraries(hyperpredictd PRIVATE log)" >> CMakeLists.txt
            echo "Added log library to CMakeLists.txt"
          fi

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                   -DANDROID_ABI=arm64-v8a \
                   -DANDROID_PLATFORM=android-29 \
                   -GNinja
          ninja
          cd ..

      - name: Create Module
        run: |
          mkdir -p magisk_module/{system/bin,logs,META-INF/com/google/android}
          cp build/hyperpredictd magisk_module/system/bin/
          
          # module.prop
          echo "id=hyperpredict" > magisk_module/module.prop
          echo "name=HyperPredict" >> magisk_module/module.prop
          echo "version=v$(date +%Y%m%d)" >> magisk_module/module.prop
          echo "author=ye3912" >> magisk_module/module.prop
          
          # service.sh
          cat > magisk_module/service.sh << 'EOF'
#!/system/bin/sh
MODDIR=${0%/*}
sleep 20
mkdir -p $MODDIR/logs
nohup $MODDIR/system/bin/hyperpredictd > $MODDIR/logs/hp.log 2>&1 &
EOF
          chmod +x magisk_module/service.sh
          
          # update-binary
          mkdir -p magisk_module/META-INF/com/google/android
          echo "#!/sbin/sh" > magisk_module/META-INF/com/google/android/update-binary
          echo "unzip -o \"\$ZIPFILE\" -d \$MODPATH" >> magisk_module/META-INF/com/google/android/update-binary
          chmod +x magisk_module/META-INF/com/google/android/update-binary
          echo "" > magisk_module/META-INF/com/google/android/updater-script
          
          # Package
          cd magisk_module
          zip -r ../HyperPredict-magisk.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HyperPredict-Magisk
          path: HyperPredict-magisk.zip