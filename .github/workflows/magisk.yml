name: Build Magisk Module

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip clang

      - name: Verify Environment
        run: |
          echo "NDK Path: $ANDROID_NDK_HOME"
          cmake --version
          ninja --version

      - name: Build HyperPredict Binary
        run: |
          echo "[*] Starting build..."
          mkdir -p build && cd build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -GNinja
          
          ninja -j$(nproc)
          cd ..
                    if [ ! -f build/hyperpredictd ]; then
            echo "ERROR: Binary not found!"
            exit 1
          fi
          echo "[✓] Build successful"

      - name: Create Magisk Module Structure
        run: |
          echo "[*] Creating module structure..."
          mkdir -p magisk_module/{system/bin,logs,META-INF/com/google/android}

      - name: Generate module.prop
        run: |
          VERSION="v$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "Generated version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          cat > magisk_module/module.prop << EOF
id=hyperpredict
name=HyperPredict
version=$VERSION
versionCode=200
author=ye3912
description=AI-powered CPU scheduler with FTRL prediction
EOF

      - name: Generate service.sh
        run: |
          cat > magisk_module/service.sh << 'EOF'
#!/system/bin/sh
MODDIR=${0%/*}
sleep 20
mkdir -p $MODDIR/logs
setenforce 0 2>/dev/null
nohup $MODDIR/system/bin/hyperpredictd > $MODDIR/logs/hp.log 2>&1 &
log -t HyperPredict "Service started (PID: $!)"
EOF
          chmod +x magisk_module/service.sh

      - name: Generate update-binary
        run: |
          cat > magisk_module/META-INF/com/google/android/update-binary << 'EOF'
#!/sbin/sh
OUTFD=$2
ZIPFILE=$3
ui_print() { echo "ui_print $1" > $OUTFD; echo "ui_print" > $OUTFD; }
ui_print "Installing HyperPredict..."
unzip -o "$ZIPFILE" 'system/bin/hyperpredictd' -d $MODPATH
chmod 755 $MODPATH/system/bin/hyperpredictd
mkdir -p $MODPATH/logsui_print "Installation complete!"
EOF
          chmod +x magisk_module/META-INF/com/google/android/update-binary
          echo "" > magisk_module/META-INF/com/google/android/updater-script

      - name: Package Module
        run: |
          echo "[*] Copying binary..."
          cp build/hyperpredictd magisk_module/system/bin/
          
          echo "[*] Packing ZIP..."
          cd magisk_module
          zip -r ../HyperPredict-${{ env.VERSION }}-magisk.zip .
          cd ..
          
          echo "[✓] Package created"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperPredict-Magisk-${{ env.VERSION }}
          path: HyperPredict-${{ env.VERSION }}-magisk.zip
          retention-days: 30