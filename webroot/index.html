<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <title>HyperPredict - KSU WebUI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <span>HyperPredict</span>
                </div>
            </div>
            <div class="header-right">
                <div class="status-indicator" id="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">连接中</span>
                </div>
            </div>
        </header>

        <!-- 主内容区域 -->
        <main class="main">
            <!-- 实时状态卡片 -->
            <section class="card">
                <div class="card-header">
                    <h2 class="card-title">实时状态</h2>
                    <span class="live-badge">LIVE</span>
                </div>

                <div class="metrics-grid">
                    <div class="metric-item">
                        <div class="metric-value" id="fps-value">60</div>
                        <div class="metric-label">FPS</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="temp-value">42</div>
                        <div class="metric-label">温度 (°C)</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="battery-value">85</div>
                        <div class="metric-label">电池 (%)</div>
                    </div>
                </div>

                <!-- CPU 负载 -->
                <div class="cpu-section">
                    <div class="section-header">
                        <span>CPU 负载</span>
                        <span class="cpu-percent" id="cpu-percent">50%</span>
                    </div>
                    <div class="cpu-bars" id="cpu-bars">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 频率信息 -->
                <div class="freq-section">
                    <div class="freq-item">
                        <span class="freq-label">LITTLE</span>
                        <span class="freq-value" id="freq-little">400 MHz</span>
                    </div>
                    <div class="freq-item">
                        <span class="freq-label">BIG</span>
                        <span class="freq-value" id="freq-big">1800 MHz</span>
                    </div>
                </div>
            </section>

            <!-- 预测模型卡片 -->
            <section class="card">
                <div class="card-header">
                    <h2 class="card-title">预测模型</h2>
                </div>

                <div class="model-selector">
                    <button class="model-btn active" data-model="neural">神经网络</button>
                    <button class="model-btn" data-model="linear">线性回归</button>
                    <button class="model-btn" data-model="hybrid">混合</button>
                </div>

                <div class="prediction-display">
                    <div class="pred-item">
                        <span class="pred-label">实际 FPS</span>
                        <span class="pred-value" id="actual-fps">60</span>
                    </div>
                    <div class="pred-arrow">→</div>
                    <div class="pred-item">
                        <span class="pred-label">预测 FPS</span>
                        <span class="pred-value predicted" id="predicted-fps">59</span>
                    </div>
                </div>

                <div class="model-stats">
                    <div class="stat-item">
                        <span class="stat-label">MAE</span>
                        <span class="stat-value" id="model-mae">2.3</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">准确率</span>
                        <span class="stat-value success" id="model-accuracy">96%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">场景</span>
                        <span class="stat-value info" id="current-scene">DAILY</span>
                    </div>
                </div>
            </section>

            <!-- 调度策略卡片 -->
            <section class="card">
                <div class="card-header">
                    <h2 class="card-title">调度策略</h2>
                </div>

                <div class="mode-selector">
                    <button class="mode-btn" data-mode="daily">
                        <span class="mode-icon">⚖️</span>
                        <span>均衡</span>
                    </button>
                    <button class="mode-btn active" data-mode="game">
                        <span class="mode-icon">🎮</span>
                        <span>游戏</span>
                    </button>
                    <button class="mode-btn" data-mode="turbo">
                        <span class="mode-icon">🚀</span>
                        <span>性能</span>
                    </button>
                </div>

                <div class="slider-group">
                    <div class="slider-item">
                        <div class="slider-header">
                            <span>uclamp.min</span>
                            <span class="slider-value" id="uclamp-min-value">50%</span>
                        </div>
                        <input type="range" id="uclamp-min" min="0" max="100" value="50" class="slider">
                    </div>
                    <div class="slider-item">
                        <div class="slider-header">
                            <span>uclamp.max</span>
                            <span class="slider-value" id="uclamp-max-value">100%</span>
                        </div>
                        <input type="range" id="uclamp-max" min="0" max="100" value="100" class="slider">
                    </div>
                </div>
            </section>

            <!-- 温控策略卡片 -->
            <section class="card">
                <div class="card-header">
                    <h2 class="card-title">温控策略</h2>
                </div>

                <div class="thermal-selector">
                    <button class="thermal-btn" data-preset="aggressive">
                        <span class="thermal-icon">🥶</span>
                        <span>激进</span>
                    </button>
                    <button class="thermal-btn active" data-preset="balanced">
                        <span class="thermal-icon">⚖️</span>
                        <span>均衡</span>
                    </button>
                    <button class="thermal-btn" data-preset="quiet">
                        <span class="thermal-icon">🔇</span>
                        <span>静音</span>
                    </button>
                </div>

                <div class="thermal-info">
                    <div class="info-item">
                        <span>温控余量</span>
                        <span class="info-value success" id="thermal-margin">20°C 充足</span>
                    </div>
                </div>
            </section>

            <!-- 系统信息卡片 -->
            <section class="card">
                <div class="card-header">
                    <h2 class="card-title">系统信息</h2>
                </div>

                <div class="info-list">
                    <div class="info-item">
                        <span>SoC</span>
                        <span id="soc-name">Snapdragon 865</span>
                    </div>
                    <div class="info-item">
                        <span>版本</span>
                        <span>v4.2.0</span>
                    </div>
                    <div class="info-item">
                        <span>运行时间</span>
                        <span id="uptime">00:00:00</span>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <button class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
                <span>监控</span>
            </button>
            <button class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <span>预测</span>
            </button>
            <button class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
                <span>调度</span>
            </button>
            <button class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span>设置</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
