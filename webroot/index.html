<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>HyperPredict</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- 状态栏 -->
        <header class="status-bar">
            <span class="time" id="current-time">12:00</span>
            <div class="status-right">
                <span class="signal">●●●●</span>
                <span class="wifi">✛</span>
                <span class="battery">🔋</span>
            </div>
        </header>

        <!-- 导航栏 -->
        <header class="nav-bar">
            <div class="nav-title">HyperPredict</div>
            <div class="nav-status" id="conn-status">
                <span class="dot"></span>
                <span class="text">连接中</span>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="content">
            <!-- 实时监控 -->
            <section class="card">
                <div class="card-header">
                    <span class="card-title">实时状态</span>
                    <span class="live">LIVE</span>
                </div>
                
                <div class="metrics">
                    <div class="metric primary">
                        <div class="metric-value" id="fps-value">60</div>
                        <div class="metric-unit">FPS</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="temp-value">42</div>
                        <div class="metric-unit">°C</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="battery-value">85</div>
                        <div class="metric-unit">%</div>
                    </div>
                </div>

                <!-- CPU 负载条 -->
                <div class="cpu-section">
                    <div class="section-header">
                        <span>CPU 负载</span>
                        <span class="cpu-percent" id="cpu-util">50%</span>
                    </div>
                    <div class="cpu-bars">
                        <div class="cpu-bar"><div class="fill" style="width: 30%"></div></div>
                        <div class="cpu-bar"><div class="fill" style="width: 25%"></div></div>
                        <div class="cpu-bar"><div class="fill" style="width: 35%"></div></div>
                        <div class="cpu-bar"><div class="fill" style="width: 20%"></div></div>
                        <div class="cpu-bar big"><div class="fill" style="width: 45%"></div></div>
                        <div class="cpu-bar big"><div class="fill" style="width: 50%"></div></div>
                        <div class="cpu-bar big"><div class="fill" style="width: 60%"></div></div>
                        <div class="cpu-bar big"><div class="fill" style="width: 55%"></div></div>
                    </div>
                </div>

                <!-- 频率 -->
                <div class="freq-row">
                    <div class="freq-item">
                        <span class="label">LITTLE</span>
                        <span class="value" id="freq-little">400</span>
                        <span class="unit">MHz</span>
                    </div>
                    <div class="freq-item">
                        <span class="label">BIG</span>
                        <span class="value" id="freq-big">1800</span>
                        <span class="unit">MHz</span>
                    </div>
                </div>
            </section>

            <!-- 预测面板 -->
            <section class="card">
                <div class="card-header">
                    <span class="card-title">帧率预测</span>
                </div>
                
                <div class="model-tabs">
                    <button class="tab active" data-model="neural">神经网络</button>
                    <button class="tab" data-model="linear">线性回归</button>
                    <button class="tab" data-model="hybrid">混合</button>
                </div>
                
                <div class="predict-row">
                    <div class="pred-box">
                        <span class="label">实际</span>
                        <span class="value actual" id="actual-fps">60</span>
                    </div>
                    <span class="arrow">→</span>
                    <div class="pred-box">
                        <span class="label">预测</span>
                        <span class="value predicted" id="predicted-fps">59</span>
                    </div>
                </div>
                
                <div class="model-stats">
                    <div class="stat">
                        <span class="label">MAE</span>
                        <span class="value" id="model-mae">2.3</span>
                    </div>
                    <div class="stat">
                        <span class="label">准确率</span>
                        <span class="value green" id="model-accuracy">96%</span>
                    </div>
                    <div class="stat">
                        <span class="label">场景</span>
                        <span class="value purple" id="current-scene">DAILY</span>
                    </div>
                </div>
            </section>

            <!-- 调度控制 -->
            <section class="card">
                <div class="card-header">
                    <span class="card-title">调度策略</span>
                </div>
                
                <div class="mode-buttons">
                    <button class="mode-btn" data-mode="daily">⚖️ 均衡</button>
                    <button class="mode-btn active" data-mode="game">🎮 游戏</button>
                    <button class="mode-btn" data-mode="turbo">🚀 性能</button>
                </div>
                
                <div class="sliders">
                    <div class="slider-row">
                        <div class="slider-label">
                            <span>uclamp.min</span>
                            <span class="slider-value" id="uclamp-min-val">50%</span>
                        </div>
                        <input type="range" id="uclamp-min" min="0" max="100" value="50">
                    </div>
                    <div class="slider-row">
                        <div class="slider-label">
                            <span>uclamp.max</span>
                            <span class="slider-value" id="uclamp-max-val">100%</span>
                        </div>
                        <input type="range" id="uclamp-max" min="0" max="100" value="100">
                    </div>
                </div>
            </section>

            <!-- 温控 -->
            <section class="card">
                <div class="card-header">
                    <span class="card-title">温控策略</span>
                </div>
                
                <div class="thermal-buttons">
                    <button class="thermal-btn" data-preset="aggressive">🥶 激进</button>
                    <button class="thermal-btn active" data-preset="balanced">⚖️ 均衡</button>
                    <button class="thermal-btn" data-preset="quiet">🔇 静音</button>
                </div>
                
                <div class="thermal-info">
                    <div class="info-row">
                        <span>温控余量</span>
                        <span class="green" id="thermal-margin">20°C 充足</span>
                    </div>
                </div>
            </section>

            <!-- 系统信息 -->
            <section class="card">
                <div class="card-header">
                    <span class="card-title">系统信息</span>
                </div>
                <div class="info-list">
                    <div class="info-row">
                        <span>SoC</span>
                        <span id="soc-name">Snapdragon 865</span>
                    </div>
                    <div class="info-row">
                        <span>版本</span>
                        <span>v4.2.0</span>
                    </div>
                    <div class="info-row">
                        <span>运行时间</span>
                        <span id="uptime">00:00:00</span>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部标签栏 -->
        <nav class="tab-bar">
            <button class="tab-item active">
                <span class="icon">📊</span>
                <span>监控</span>
            </button>
            <button class="tab-item">
                <span class="icon">🧠</span>
                <span>预测</span>
            </button>
            <button class="tab-item">
                <span class="icon">⚡</span>
                <span>调度</span>
            </button>
            <button class="tab-item">
                <span class="icon">⚙️</span>
                <span>设置</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
